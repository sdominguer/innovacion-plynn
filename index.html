function PostIt({ text, tipo = "necesidad", onDelete, onChange, editable = true }) {
  const colors = {
    problema: { bg: "#FF6B6B", text: "#fff" },
    necesidad: { bg: "#FFD93D", text: "#333" },
    oportunidad: { bg: "#6BCB77", text: "#fff" },
  };
  const c = colors[tipo] || colors.necesidad;
  return (
    <div style={{
      background: c.bg, color: c.text, padding: "10px 12px", borderRadius: 4,
      minWidth: 120, minHeight: 70, position: "relative",
      boxShadow: "2px 3px 8px rgba(0,0,0,0.15)", fontFamily: "'Caveat', cursive",
      fontSize: 15, display: "flex", alignItems: "center", justifyContent: "center",
      transform: `rotate(${Math.random() * 4 - 2}deg)`,
    }}>
      {editable ? (
        <textarea value={text} onChange={e => onChange(e.target.value)}
          placeholder="Escribe aquí..."
          style={{
            background: "transparent", border: "none", color: c.text,
            width: "100%", height: "100%", resize: "none", fontFamily: "inherit",
            fontSize: "inherit", textAlign: "center", outline: "none",
          }}
        />
      ) : <span>{text}</span>}
      {onDelete && (
        <button onClick={onDelete} style={{
          position: "absolute", top: 2, right: 4, background: "none",
          border: "none", cursor: "pointer", fontSize: 14, opacity: 0.6,
          color: c.text,
        }}>✕</button>
      )}
    </div>
  );
}

function MatrizPriorizacion({ items, onChange, labelA = "Reto", labels }) {
  return (
    <div style={{ padding: 16 }}>
      <div style={{

        gap: 2, borderRadius: 12, overflow: "hidden", maxWidth: 600, margin: "0 auto",

      }}>
        {["Innovación Cerrada", "Intraemprendimiento", "Innovación Abierta", "Descartados"].map((label, qi) => (
          <div key={qi} style={{
            background: qi === 0 ? "#E8F5E9" : qi === 1 ? "#FFF3E0" : qi === 2 ? "#E3F2FD" : "#FFEBEE",
            padding: 16, minHeight: 100,
          }}>
            <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 8, color: COLORS.navy }}>{label}</div>
            <div style={{ fontSize: 12, color: COLORS.gray }}>
              {qi === 0 ? "Alto Estratégico + Alto Factible" :
               qi === 1 ? "Bajo Estratégico + Alto Factible" :
               qi === 2 ? "Alto Estratégico + Bajo Factible" :
               "Bajo Estratégico + Bajo Factible"}
            </div>
            <div style={{ marginTop: 8, display: "flex", flexWrap: "wrap", gap: 4 }}>
              {items.filter(it => {
                const e = it.estrategico >= 3;
                const f = it.factible >= 3;
                if (qi === 0) return e && f;
                if (qi === 1) return !e && f;
                if (qi === 2) return e && !f;
                return !e && !f;
              }).map((it, i) => (
                <span key={i} style={{
                  background: it.tipo === "problema" ? "#FF6B6B" : it.tipo === "oportunidad" ? "#6BCB77" : "#FFD93D",
                  padding: "2px 8px", borderRadius: 4, fontSize: 12,
                  color: it.tipo === "necesidad" ? "#333" : "#fff",
                }}>{it.nombre || `${labelA} ${i + 1}`}</span>
              ))}
            </div>
          </div>
        ))}
      </div>
      <div style={{ marginTop: 20 }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 14 }}>
          <thead>
            <tr style={{ background: COLORS.navy, color: "#fff" }}>
              <th style={{ padding: 8, textAlign: "left" }}>{labelA}</th>
              <th style={{ padding: 8 }}>Tipo</th>
              <th style={{ padding: 8 }}>Estratégico (1-5)</th>
              <th style={{ padding: 8 }}>Factible (1-5)</th>
            </tr>
          </thead>
          <tbody>
            {items.map((item, i) => (
              <tr key={i} style={{ borderBottom: `1px solid ${COLORS.lightGray}` }}>
                <td style={{ padding: 8 }}>
                  <input value={item.nombre} onChange={e => {
                    const n = [...items]; n[i] = { ...n[i], nombre: e.target.value }; onChange(n);
                  }} placeholder={`${labelA} ${i + 1}`} style={inputStyle} />
                </td>
                <td style={{ padding: 8, textAlign: "center" }}>
                  <select value={item.tipo || "necesidad"} onChange={e => {
                    const n = [...items]; n[i] = { ...n[i], tipo: e.target.value }; onChange(n);
                  }} style={{ ...inputStyle, width: "auto", textAlign: "center" }}>
                    <option value="problema">🔴 Problema</option>
                    <option value="necesidad">🟡 Necesidad</option>
                    <option value="oportunidad">🟢 Oportunidad</option>
                  </select>
                </td>
                <td style={{ padding: 8, textAlign: "center" }}>
                  <input type="range" min={1} max={5} value={item.estrategico}
                    onChange={e => { const n = [...items]; n[i] = { ...n[i], estrategico: +e.target.value }; onChange(n); }}
                    style={{ width: 80 }} />
                  <span style={{ marginLeft: 8, fontWeight: 700 }}>{item.estrategico}</span>
                </td>
                <td style={{ padding: 8, textAlign: "center" }}>
                  <input type="range" min={1} max={5} value={item.factible}
                    onChange={e => { const n = [...items]; n[i] = { ...n[i], factible: +e.target.value }; onChange(n); }}
                    style={{ width: 80 }} />
                  <span style={{ marginLeft: 8, fontWeight: 700 }}>{item.factible}</span>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

          color: "#444", borderTop: "1px solid #F0D98C",

          {children}

}

function RenderActivity({ activityId, data, setData }) {
  const u = (field, val) => setData(prev => ({ ...prev, [field]: val }));
  const uNested = (field, subfield, val) => setData(prev => ({
    ...prev, [field]: { ...prev[field], [subfield]: val }
  }));
  const [showActa, setShowActa] = useState(false);

  switch (activityId) {
    // ---- TALLER 0: EMPRESA ----
    case "a1-3":
      return (
        <div>
          <div style={tipStyle}>Diligencia junto con tu equipo los datos que se te piden sobre la empresa.</div>
          <div style={cardStyle}>
            <label style={labelStyle}>Nombre de la empresa</label>
            <input style={inputStyle} value={data.empresa.nombre}
              onChange={e => uNested("empresa", "nombre", e.target.value)} placeholder="Ej: Mi Empresa S.A.S." />

function generateSheetsData(data) {
  const rows = [];
  rows.push(["PLANTILLA INNOVACCIÓN 2026 — PLYNN"]);
  rows.push(["Exportado el", new Date().toLocaleString("es-CO")]);
  rows.push([]);

  // Empresa
  rows.push(["=== DATOS DE LA EMPRESA ==="]);
  rows.push(["Nombre", data.empresa.nombre]);
  rows.push(["Sector", data.empresa.sector]);
  rows.push(["Empleados", data.empresa.empleados]);
  rows.push(["Productos", data.empresa.productos]);
  rows.push([]);

  // Comité
  rows.push(["=== COMITÉ DE INNOVACIÓN ==="]);
  rows.push(["Departamento", "Nombre"]);
  data.comite.forEach(m => rows.push([m.departamento, m.nombre]));
  rows.push(["Líder de Innovación", data.liderInnovacion]);
  rows.push([]);

  // Canvas
  rows.push(["=== BUSINESS MODEL CANVAS ==="]);
  Object.entries(data.canvas).forEach(([k, v]) => rows.push([k, v]));
  rows.push([]);

  // Focos
  rows.push(["=== FOCOS DE INNOVACIÓN ==="]);
  rows.push(["Tipo", "Porcentaje", "Descripción"]);
  data.focos.forEach(f => rows.push([f.tipo, f.porcentaje + "%", f.descripcion]));
  rows.push([]);

  // Estrategia
  rows.push(["=== ESTRATEGIA ==="]);
  rows.push(["Objetivos Estratégicos", data.objetivosEstrategicos]);
  rows.push(["Objetivos de Innovación", data.objetivosInnovacion || ""]);
  rows.push(["Estrategia de Innovación", data.estrategiaInnovacion]);
  rows.push(["Recursos", data.recursosEstrategia]);
  rows.push([]);

  // Retos
  rows.push(["=== RETOS ==="]);
  rows.push(["Tipo", "Categoría", "Descripción"]);
  data.retosInternos.forEach(r => rows.push([r.tipo, "Interno", r.text]));
  data.retosCadena.forEach(r => rows.push([r.tipo, "Cadena", r.text]));
  data.retosSector.forEach(r => rows.push([r.tipo, "Sector", r.text]));
  rows.push([]);
  rows.push(["Retos Evaluados"]);
  rows.push(["Nombre", "Tipo", "Estratégico", "Factible"]);
  data.retosEvaluados.forEach(r => rows.push([r.nombre, r.tipo, r.estrategico, r.factible]));
  rows.push(["Reto cerrado", data.retoCerrado]);
  rows.push(["Reto abierto", data.retoAbierto]);
  rows.push([]);

  // Ideas
  rows.push(["=== IDEAS ==="]);
  data.ideas.forEach(i => rows.push([i.tipo, i.text]));
  rows.push(["Idea que continúa", data.ideaContinua]);
  rows.push([]);

  // PMV
  rows.push(["=== PMV ==="]);
  rows.push(["Reto", data.pmv.reto]);
  rows.push(["Idea", data.pmv.idea]);
  rows.push(["Mercado", data.pmv.mercado]);
  rows.push(["Funcionalidades", data.pmv.funcionalidades]);
  rows.push(["Conclusiones", data.conclusionesPMV]);
  rows.push(["Decisión", data.decisionPMV]);
  rows.push([]);

  // Indicadores
  rows.push(["=== INDICADORES ==="]);
  rows.push(["Nombre", "Objetivo", "Fórmula", "Fuente", "Meta", "Periodicidad"]);
  data.indicadores.forEach(i => rows.push([i.nombre, i.objetivo, i.formula, i.fuente, i.meta, i.periodicidad]));

  return rows;
}

function downloadCSV(data) {
  const rows = generateSheetsData(data);
  const csv = rows.map(r => r.map(c => `"${String(c || "").replace(/"/g, '""')}"`).join(",")).join("\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `INNOVACCION_${data.empresa.nombre || "empresa"}_${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ============================================================
// PROGRESS TRACKER
// ============================================================
function calcProgress(data) {
  let filled = 0, total = 0;
  const check = (val) => { total++; if (val && String(val).trim()) filled++; };
  check(data.empresa.nombre); check(data.empresa.sector); check(data.empresa.empleados);
  data.comite.forEach(m => { check(m.departamento); check(m.nombre); });
  check(data.liderInnovacion);
  check(data.acta.fecha);
  Object.values(data.canvas).forEach(v => check(v));
  data.focos.forEach(f => check(f.descripcion));
  check(data.objetivosEstrategicos); check(data.estrategiaInnovacion);
  check(data.retoCerrado); check(data.retoAbierto);
  check(data.ideaContinua);
  check(data.pmv.reto); check(data.pmv.idea); check(data.pmv.funcionalidades);
  check(data.conclusionesPMV);
  data.indicadores.forEach(i => check(i.nombre));
  return total > 0 ? Math.round((filled / total) * 100) : 0;
}

function InnovaccionApp() {
  const [data, setData] = useState(DEFAULT_DATA);

  const [currentActivity, setCurrentActivity] = useState(0);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [loaded, setLoaded] = useState(false);
  const [saving, setSaving] = useState(false);
  const [showingIntro, setShowingIntro] = useState(true);
  const saveTimeout = useRef(null);

  // Load data
  useEffect(() => {
    const load = async () => {
      try {
        const raw = localStorage.getItem(STORAGE_KEY); const result = raw ? { value: raw } : null;
        if (result && result.value) {
          const parsed = JSON.parse(result.value);
          setData(prev => ({ ...prev, ...parsed }));
          if (parsed.currentTaller !== undefined) setCurrentTaller(parsed.currentTaller);
          if (parsed.currentActivity !== undefined) setCurrentActivity(parsed.currentActivity);
        }
      } catch (e) {
        console.log("No saved data found, starting fresh");
      }
      setLoaded(true);
    };
    load();
  }, []);

  // Auto-save with debounce
  useEffect(() => {
    if (!loaded) return;
    if (saveTimeout.current) clearTimeout(saveTimeout.current);
    saveTimeout.current = setTimeout(async () => {
      setSaving(true);
      try {
        const toSave = { ...data, currentTaller, currentActivity, lastSaved: new Date().toISOString() };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
      } catch (e) {
        console.error("Save failed:", e);
      }
      setTimeout(() => setSaving(false), 800);
    }, 1500);
  }, [data, currentTaller, currentActivity, loaded]);

  const progress = calcProgress(data);
  const taller = TALLERES[currentTaller];
  const activity = taller?.actividades[currentActivity];

  const goToActivity = (ti, ai) => {
    if (ti !== currentTaller) {
      setCurrentTaller(ti);
      setCurrentActivity(ai);
      setShowingIntro(true);
    } else {
      setCurrentActivity(ai);
      setShowingIntro(false);
    }
    setSidebarOpen(false);
  };

  const startTaller = () => {
    setShowingIntro(false);
    setCurrentActivity(0);
  };

  const nextActivity = () => {
    if (showingIntro) {
      setShowingIntro(false);
      setCurrentActivity(0);
    } else if (currentActivity < taller.actividades.length - 1) {
      setCurrentActivity(currentActivity + 1);
    } else if (currentTaller < TALLERES.length - 1) {
      setCurrentTaller(currentTaller + 1);
      setCurrentActivity(0);
      setShowingIntro(true);
    }
  };

  const prevActivity = () => {
    if (showingIntro && currentTaller > 0) {
      const prevT = currentTaller - 1;
      setCurrentTaller(prevT);
      setCurrentActivity(TALLERES[prevT].actividades.length - 1);
      setShowingIntro(false);
    } else if (showingIntro) {
      return;
    } else if (currentActivity > 0) {
      setCurrentActivity(currentActivity - 1);
    } else {
      setShowingIntro(true);
    }
  };

  if (!loaded) {
    return (
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "center",

        </div>
      </div>
    );

    <div style={{
      fontFamily: "'Montserrat', sans-serif",

              {/* Start button */}
              <button onClick={startTaller}
                style={{
                  background: `linear-gradient(135deg, ${taller.color}, ${taller.color}CC)`,
                  color: "#fff", border: "none", padding: "16px 48px", borderRadius: 12,
                  cursor: "pointer", fontSize: 18, fontWeight: 800,
                  fontFamily: "'Montserrat', sans-serif",
                  boxShadow: `0 6px 25px ${taller.color}40`,
                  display: "inline-flex", alignItems: "center", gap: 10,
                  transition: "transform 0.2s, box-shadow 0.2s",
                }}>
                Iniciar Taller →
              </button>

              {/* Bottom decorative bar */}
              <div style={{
                width: "100%", height: 6, borderRadius: 3,
                background: `linear-gradient(90deg, ${COLORS.cyan}, ${taller.color})`,
                marginTop: 40,
              }} />
            </div>
          ) : (
            /* ====== NORMAL ACTIVITY VIEW ====== */
            <div style={{ maxWidth: 900, margin: "0 auto" }}>
              {/* Activity description */}
              {activity && (
                <div style={{
                  marginBottom: 20, padding: "12px 16px",
                  background: "#fff", borderRadius: 10,
                  borderLeft: `4px solid ${taller.color}`,
                  fontSize: 14, color: COLORS.gray, lineHeight: 1.5,
                }}>
                  {activity.desc}
                </div>
              )}

              {/* Render the activity */}
              {activity && <RenderActivity activityId={activity.id} data={data} setData={setData} />}
            </div>
          )}
        </div>

        {/* Bottom navigation */}
        <div style={{
          background: "#fff", padding: "12px 24px",
          borderTop: `1px solid ${COLORS.lightGray}`,
          display: "flex", justifyContent: "space-between", alignItems: "center",
        }}>
          <button onClick={prevActivity}
            disabled={currentTaller === 0 && showingIntro}
            style={{
              ...btnStyle(COLORS.navy), opacity: (currentTaller === 0 && showingIntro) ? 0.3 : 1,
              padding: "10px 20px",
            }}>
            ← Anterior
          </button>
          <span style={{ fontSize: 12, color: COLORS.gray }}>
            {showingIntro
              ? `Taller ${currentTaller + 1} de ${TALLERES.length}`
              : `Taller ${currentTaller + 1} · Actividad ${currentActivity + 1} de ${taller.actividades.length}`
            }
          </span>
          <button onClick={nextActivity}
            disabled={currentTaller === TALLERES.length - 1 && !showingIntro && currentActivity === taller.actividades.length - 1}
            style={{
              ...btnStyle(COLORS.cyan),
              opacity: (currentTaller === TALLERES.length - 1 && !showingIntro && currentActivity === taller.actividades.length - 1) ? 0.3 : 1,
              padding: "10px 20px",
            }}>
            {showingIntro ? "Iniciar →" : "Siguiente →"}
          </button>
        </div>
      </main>
    </div>
  );
}

// ============================================================
// MOUNT
// ============================================================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(InnovaccionApp));
  </script>
</body>
</html>
