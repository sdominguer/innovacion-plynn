const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvHvdG6J6ekLxrFS4ugpaxsx6BXgGCmniGcfN-NI449RZ8wDKvhX-fL2qXgRMdVbeP/exec";

async function apiCall(action, params = {}) {
  // ── MODO LOCAL (sin backend) ──────────────────────────────
  // Si no hay URL configurada o la llamada falla, todo se
  // resuelve con localStorage para que la herramienta funcione
  // sin necesidad de Google Apps Script.
  const USE_LOCAL = !APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes("TU_URL");

  if (action === "login") {
    const stored = localStorage.getItem("user_" + params.empresa);
    if (!stored) return { success: false, error: "Empresa no registrada. Regístrate primero." };
    const u = JSON.parse(stored);
    if (u.password !== params.password) return { success: false, error: "Contraseña incorrecta." };
    return { success: true, empresa: params.empresa };
  }

  if (action === "register") {
    const existing = localStorage.getItem("user_" + params.empresa);
    if (existing) return { success: false, error: "Esta empresa ya está registrada. Inicia sesión." };
    localStorage.setItem("user_" + params.empresa, JSON.stringify({ password: params.password, email: params.email || "" }));
    return { success: true };
  }

  if (action === "load") {
    const raw = localStorage.getItem(STORAGE_KEY + "_" + params.empresa);
    if (raw) return { success: true, datos: JSON.parse(raw) };
    return { success: true, datos: {} };
  }

  if (action === "save") {
    // localStorage ya se guarda en el useEffect; aquí solo simulamos éxito
    // Si hay backend configurado, intentamos también enviarlo
    if (!USE_LOCAL) {
      try {
        let url = APPS_SCRIPT_URL + "?action=" + encodeURIComponent(action);
        for (const [key, val] of Object.entries(params)) {
          if (key === "datos") url += "&payload=" + encodeURIComponent(JSON.stringify(val));
          else url += "&" + encodeURIComponent(key) + "=" + encodeURIComponent(val);
        }
        const res = await fetch(url);
        return await res.json();
      } catch (e) {
        // Si falla el backend, no pasa nada — ya está en localStorage
        return { success: true };
      }
    }
    return { success: true };
  }

  // Cualquier otra acción: intento al backend si está configurado
  if (!USE_LOCAL) {
    try {
      let url = APPS_SCRIPT_URL + "?action=" + encodeURIComponent(action);
      for (const [key, val] of Object.entries(params)) {
        if (key === "datos") url += "&payload=" + encodeURIComponent(JSON.stringify(val));
        else url += "&" + encodeURIComponent(key) + "=" + encodeURIComponent(val);
      }
      const res = await fetch(url);
      return await res.json();
    } catch (e) {
      return { success: false, error: "Error de conexión." };
    }
  }

  return { success: true };
}

function PostIt({ text, tipo = "necesidad", onDelete, onChange, editable = true }) {
  const colors = {
    problema: { bg: "#FF6B6B", text: "#fff" },
    necesidad: { bg: "#FFD93D", text: "#333" },
    oportunidad: { bg: "#6BCB77", text: "#fff" },
  };
  const c = colors[tipo] || colors.necesidad;
  const rotation = useRef(Math.random() * 4 - 2).current;
  return (
    <div style={{
      background: c.bg, color: c.text, padding: "10px 12px", borderRadius: 4,
      width: 140, minHeight: 90, position: "relative",
      boxShadow: "2px 3px 8px rgba(0,0,0,0.15)", fontFamily: "'Caveat', cursive",
      fontSize: 15, display: "flex", alignItems: "center", justifyContent: "center",
      transform: `rotate(${rotation}deg)`,
    }}>
      {editable ? (
        <textarea
          value={text}
          onChange={e => onChange(e.target.value)}
          placeholder="Escribe aquí..."
          style={{
            background: "transparent", border: "none", color: c.text,
            width: "100%", minHeight: 60, resize: "none", fontFamily: "inherit",
            fontSize: "inherit", textAlign: "center", outline: "none",
            cursor: "text", caretColor: c.text,
          }}
        />
      ) : <span>{text}</span>}
      {onDelete && (
        <button onClick={onDelete} style={{
          position: "absolute", top: 2, right: 4, background: "none",
          border: "none", cursor: "pointer", fontSize: 14, opacity: 0.6,
          color: c.text,
        }}>✕</button>
      )}
    </div>
  );
}

// ============================================================
// RETO POST-IT — componente con estado local para evitar pérdida de foco
// ============================================================
function RetoPostIt({ text, tipo, onTextChange, onTipoChange, onDelete }) {
  const [localText, setLocalText] = useState(text);
  const saveTimeout = useRef(null);
  const colors = {
    problema: { bg: "#FF6B6B", text: "#fff" },
    necesidad: { bg: "#FFD93D", text: "#333" },
    oportunidad: { bg: "#6BCB77", text: "#fff" },
  };
  const c = colors[tipo] || colors.necesidad;
  const rotation = useRef(Math.random() * 4 - 2).current;

  const handleChange = (val) => {
    setLocalText(val);
    // Debounce the parent update to avoid re-renders while typing
    if (saveTimeout.current) clearTimeout(saveTimeout.current);
    saveTimeout.current = setTimeout(() => {
      onTextChange(val);
    }, 400);
  };

  return (
    <div style={{ position: "relative", marginTop: 10 }}>
      <select value={tipo} onChange={e => onTipoChange(e.target.value)}
        style={{ position: "absolute", top: -8, left: 2, fontSize: 10, border: "none", background: "transparent", zIndex: 2, cursor: "pointer" }}>
        <option value="problema">🔴</option>
        <option value="necesidad">🟡</option>
        <option value="oportunidad">🟢</option>
      </select>
      <div style={{
        background: c.bg, color: c.text, padding: "10px 12px", borderRadius: 4,
        width: 140, minHeight: 90, position: "relative",
        boxShadow: "2px 3px 8px rgba(0,0,0,0.15)", fontFamily: "'Caveat', cursive",
        fontSize: 15, display: "flex", alignItems: "center", justifyContent: "center",
        transform: `rotate(${rotation}deg)`,
      }}>
        <textarea
          value={localText}
          onChange={e => handleChange(e.target.value)}
          placeholder="Escribe aquí..."
          style={{
            background: "transparent", border: "none", color: c.text,
            width: "100%", minHeight: 60, resize: "none", fontFamily: "inherit",
            fontSize: "inherit", textAlign: "center", outline: "none",
            cursor: "text", caretColor: c.text,
          }}
        />
        <button onClick={onDelete} style={{
          position: "absolute", top: 2, right: 4, background: "none",
          border: "none", cursor: "pointer", fontSize: 14, opacity: 0.6, color: c.text,
        }}>✕</button>
      </div>
    </div>
  );
}

// RETO COLUMN — columna de post-its para cartelera de retos
// ============================================================
function RetoColumn({ title, subtitle, retos, onAdd, onUpdate, onDelete }) {
  return (
    <div style={{ flex: 1, minWidth: 220 }}>
      <div style={{ background: "#0D3B47", color: "#fff", padding: 10, textAlign: "center", fontWeight: 700, fontSize: 14, borderRadius: "8px 8px 0 0" }}>{title}</div>
      <div style={{ background: "#1A5C6B", color: "#ccc", padding: 6, textAlign: "center", fontSize: 11 }}>{subtitle}</div>
      <div style={{ background: "#E8ECF5", padding: 12, borderRadius: "0 0 8px 8px", minHeight: 220, display: "flex", flexWrap: "wrap", gap: 8, alignContent: "flex-start" }}>
        {retos.map((r, i) => (
          <RetoPostIt
            key={r.id || i}
            text={r.text}
            tipo={r.tipo}
            onTextChange={t => onUpdate(i, { text: t })}
            onTipoChange={t => onUpdate(i, { tipo: t })}
            onDelete={() => onDelete(i)}
          />
        ))}
        <button onClick={onAdd}
          style={{ background: "#0FBCCC", color: "#fff", border: "none", width: 44, height: 44, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, padding: 0, alignSelf: "center", cursor: "pointer", fontFamily: "'Montserrat', sans-serif" }}>+</button>
      </div>
    </div>
  );
}

function downloadCSV(data) {
  const rows = generateSheetsData(data);
  const csv = rows.map(r => r.map(c => `"${String(c || "").replace(/"/g, '""')}"`).join(",")).join("\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `INNOVACCION_${data.empresa.nombre || "empresa"}_${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ============================================================
// PROGRESS TRACKER
// ============================================================
function calcProgress(data) {
  let filled = 0, total = 0;
  const check = (val) => { total++; if (val && String(val).trim()) filled++; };
  check(data.empresa.nombre); check(data.empresa.sector); check(data.empresa.empleados);
  data.comite.forEach(m => { check(m.departamento); check(m.nombre); });
  check(data.liderInnovacion);
  check(data.acta.fecha);
  Object.values(data.canvas).forEach(v => check(v));
  data.focos.forEach(f => check(f.porcentaje));
  check(data.objetivosEstrategicos); check(data.estrategiaInnovacion);
  check(data.retoCerrado); check(data.retoAbierto);
  check(data.ideaContinua);
  check(data.pmv.reto); check(data.pmv.idea); check(data.pmv.funcionalidades);
  check(data.conclusionesPMV);
  data.indicadores.forEach(i => check(i.nombre));
  return total > 0 ? Math.round((filled / total) * 100) : 0;
}

function InnovaccionApp({ user, onLogout }) {
  const [data, setData] = useState(DEFAULT_DATA);
  const [currentTaller, setCurrentTaller] = useState(0);
  const [currentActivity, setCurrentActivity] = useState(0);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [loaded, setLoaded] = useState(false);
  const [saving, setSaving] = useState(false);
  const [showingIntro, setShowingIntro] = useState(true);
  const saveTimeout = useRef(null);

  useEffect(() => {
    const load = async () => {
      try {
        const apiResult = await apiCall("load", { empresa: user });
        if (apiResult.success && apiResult.datos && Object.keys(apiResult.datos).length > 0) {
          const parsed = apiResult.datos;
          setData(prev => ({ ...prev, ...parsed }));
          if (parsed.currentTaller !== undefined) setCurrentTaller(parsed.currentTaller);
          if (parsed.currentActivity !== undefined) setCurrentActivity(parsed.currentActivity);
        } else {
          const raw = localStorage.getItem(STORAGE_KEY + "_" + user);
          if (raw) {
            const parsed = JSON.parse(raw);
            setData(prev => ({ ...prev, ...parsed }));
            if (parsed.currentTaller !== undefined) setCurrentTaller(parsed.currentTaller);
            if (parsed.currentActivity !== undefined) setCurrentActivity(parsed.currentActivity);
          }
        }
      } catch (e) {
        const raw = localStorage.getItem(STORAGE_KEY + "_" + user);
        if (raw) { const parsed = JSON.parse(raw); setData(prev => ({ ...prev, ...parsed })); }
      }
      setLoaded(true);
    };
    load();
  }, [user]);

  useEffect(() => {
    if (!loaded) return;
    if (saveTimeout.current) clearTimeout(saveTimeout.current);
    saveTimeout.current = setTimeout(async () => {
      setSaving(true);
      try {
        const toSave = { ...data, currentTaller, currentActivity, lastSaved: new Date().toISOString() };
        localStorage.setItem(STORAGE_KEY + "_" + user, JSON.stringify(toSave));
        await apiCall("save", { empresa: user, datos: toSave });
      } catch (e) { console.error("Save failed:", e); }
      setTimeout(() => setSaving(false), 800);
    }, 2000);
  }, [data, currentTaller, currentActivity, loaded, user]);

  const progress = calcProgress(data);
  const taller = TALLERES[currentTaller];
  const activity = taller?.actividades[currentActivity];

  const goToActivity = (ti, ai) => {
    if (ti !== currentTaller) { setCurrentTaller(ti); setCurrentActivity(ai); setShowingIntro(true); }
    else { setCurrentActivity(ai); setShowingIntro(false); }
    setSidebarOpen(false);
  };

  const startTaller = () => { setShowingIntro(false); setCurrentActivity(0); };

  const nextActivity = () => {
    if (showingIntro) { setShowingIntro(false); setCurrentActivity(0); }
    else if (currentActivity < taller.actividades.length - 1) { setCurrentActivity(currentActivity + 1); }
    else if (currentTaller < TALLERES.length - 1) { setCurrentTaller(currentTaller + 1); setCurrentActivity(0); setShowingIntro(true); }
  };

  const prevActivity = () => {
    if (showingIntro && currentTaller > 0) { const prevT = currentTaller - 1; setCurrentTaller(prevT); setCurrentActivity(TALLERES[prevT].actividades.length - 1); setShowingIntro(false); }
    else if (showingIntro) { return; }
    else if (currentActivity > 0) { setCurrentActivity(currentActivity - 1); }
    else { setShowingIntro(true); }
  };

  if (!loaded) {
    return (
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", fontFamily: "'Montserrat', sans-serif", background: COLORS.navy, color: "#fff" }}>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>🚀</div>
          <div style={{ fontSize: 20, fontWeight: 700 }}>Cargando INNOVACCIÓN...</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ fontFamily: "'Montserrat', sans-serif", display: "flex", height: "100vh", overflow: "hidden", background: COLORS.cream }}>
      {sidebarOpen && <div onClick={() => setSidebarOpen(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", zIndex: 90 }} />}

      <aside style={{
        width: 280, background: COLORS.navy, color: "#fff",
        display: "flex", flexDirection: "column", flexShrink: 0,
        position: sidebarOpen ? "fixed" : "relative", zIndex: 100, height: "100vh",
      }}>
        <div style={{ padding: "20px 16px", borderBottom: "1px solid rgba(255,255,255,0.1)", textAlign: "center" }}>
          {/* Logo de la empresa si está cargado */}
          {data.empresa.logo && (
            <div style={{ marginBottom: 10 }}>
              <img src={data.empresa.logo} alt="Logo" style={{ maxHeight: 50, maxWidth: 160, objectFit: "contain", borderRadius: 4 }} />
            </div>
          )}
          <div style={{ fontSize: 10, fontWeight: 600, color: "rgba(255,255,255,0.6)", letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 4 }}>Cámara de Comercio Aburrá Sur</div>
          <div style={{ fontSize: 20, fontWeight: 800, letterSpacing: 1 }}>
            <span style={{ color: COLORS.cyan }}>plynn</span>
          </div>
          <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.cyan, marginTop: 4 }}>PLANTILLA INNOVACCIÓN</div>
        </div>

        <div style={{ padding: "12px 16px", borderBottom: "1px solid rgba(255,255,255,0.1)" }}>
          <div style={{ fontSize: 11, color: "rgba(255,255,255,0.6)", marginBottom: 4 }}>Progreso general</div>
          <div style={{ background: "rgba(255,255,255,0.15)", borderRadius: 20, height: 8, overflow: "hidden" }}>

                    <div key={ai} onClick={() => goToActivity(ti, ai)} style={{
                      padding: "6px 12px", cursor: "pointer",
                      fontSize: 12, color: currentActivity === ai ? COLORS.cyan : "rgba(255,255,255,0.6)",
                      fontWeight: currentActivity === ai ? 600 : 400,
                      borderLeft: currentActivity === ai ? `2px solid ${COLORS.cyan}` : "2px solid transparent",
                    }}>{a.titulo}</div>
                  ))}
                </div>
              )}
            </div>
          ))}
        </nav>

        {/* CORRECCIÓN #17: Botones de descarga */}
        <div style={{ padding: "8px 16px", borderTop: "1px solid rgba(255,255,255,0.1)" }}>
          <button onClick={() => downloadFullReport(data)}
            style={{ width: "100%", padding: "10px 16px", borderRadius: 8, background: COLORS.cyan, color: "#fff", border: "none", cursor: "pointer", fontWeight: 700, fontSize: 13, fontFamily: "'Montserrat', sans-serif", marginBottom: 6 }}>
            📄 Descargar Plantilla Completa
          </button>
          <button onClick={() => downloadCSV(data)}
            style={{ width: "100%", padding: "8px 16px", borderRadius: 8, background: "rgba(15,186,227,0.2)", color: COLORS.cyan, border: `1px solid ${COLORS.cyan}`, cursor: "pointer", fontWeight: 600, fontSize: 12, fontFamily: "'Montserrat', sans-serif" }}>
            📥 Exportar a CSV
          </button>
        </div>
        <div style={{ padding: "8px 16px 16px" }}>
          <div style={{ fontSize: 11, color: "rgba(255,255,255,0.5)", marginBottom: 6, textAlign: "center" }}>Sesión: {user}</div>
          <button onClick={onLogout}
            style={{ width: "100%", padding: "8px 16px", borderRadius: 8, background: "rgba(255,255,255,0.1)", color: "rgba(255,255,255,0.7)", border: "1px solid rgba(255,255,255,0.2)", cursor: "pointer", fontWeight: 600, fontSize: 12, fontFamily: "'Montserrat', sans-serif" }}>
            Cerrar sesión
          </button>
        </div>
      </aside>

      {/* Main content */}
      <main style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        <header style={{ background: "#fff", padding: "12px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: `1px solid ${COLORS.lightGray}`, boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <button onClick={() => setSidebarOpen(!sidebarOpen)} style={{ background: "none", border: "none", fontSize: 22, cursor: "pointer", color: COLORS.navy, padding: 4 }}>☰</button>
            <div>
              <div style={{ fontSize: 11, color: COLORS.gray, fontWeight: 500 }}>{taller.icon} {taller.titulo}</div>
              <div style={{ fontSize: 16, fontWeight: 700, color: COLORS.navy }}>{showingIntro ? "Introducción al taller" : activity?.titulo}</div>
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            {saving && <span style={{ fontSize: 12, color: COLORS.green, fontWeight: 500 }}>✓ Guardado</span>}
            {data.empresa.nombre && (
              <span style={{ fontSize: 12, color: COLORS.navy, fontWeight: 600, background: COLORS.lightCyan, padding: "4px 10px", borderRadius: 20 }}>
                {data.empresa.nombre}
              </span>
            )}
          </div>
        </header>

        <div style={{ flex: 1, overflowY: "auto", padding: "20px 24px 100px" }}>
          {showingIntro ? (
            <div style={{ maxWidth: 650, margin: "0 auto", textAlign: "center", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "60vh" }}>
              <div style={{ width: "100%", height: 6, borderRadius: 3, background: `linear-gradient(90deg, ${taller.color}, ${COLORS.cyan})`, marginBottom: 40 }} />
              <div style={{ width: 80, height: 80, borderRadius: "50%", background: `linear-gradient(135deg, ${taller.color}, ${taller.color}DD)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 36, marginBottom: 20, boxShadow: `0 8px 30px ${taller.color}40` }}>
                {taller.icon}
              </div>
              <div style={{ fontSize: 13, fontWeight: 700, color: taller.color, textTransform: "uppercase", letterSpacing: 3, marginBottom: 8 }}>Taller {currentTaller + 1} de {TALLERES.length}</div>
              <h1 style={{ fontSize: 32, fontWeight: 800, color: COLORS.navy, margin: "0 0 16px", lineHeight: 1.2, fontFamily: "'Montserrat', sans-serif" }}>{taller.titulo}</h1>
              <p style={{ fontSize: 16, color: COLORS.gray, lineHeight: 1.7, maxWidth: 500, margin: "0 0 32px" }}>{taller.intro}</p>
              <div style={{ background: "#fff", borderRadius: 12, padding: "16px 20px", width: "100%", maxWidth: 450, textAlign: "left", border: `1px solid ${COLORS.lightGray}`, marginBottom: 32 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.navy, marginBottom: 10, textTransform: "uppercase", letterSpacing: 1 }}>Actividades en este taller</div>
                {taller.actividades.map((act, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: i < taller.actividades.length - 1 ? `1px solid ${COLORS.lightGray}` : "none" }}>
                    <div style={{ width: 26, height: 26, borderRadius: "50%", background: taller.color + "20", color: taller.color, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 800, flexShrink: 0 }}>{i + 1}</div>
                    <div>
                      <div style={{ fontSize: 14, fontWeight: 600, color: COLORS.navy }}>{act.titulo}</div>
                      <div style={{ fontSize: 12, color: COLORS.gray }}>{act.desc}</div>
                    </div>
                  </div>
                ))}
              </div>
              <button onClick={startTaller} style={{ background: `linear-gradient(135deg, ${taller.color}, ${taller.color}CC)`, color: "#fff", border: "none", padding: "16px 48px", borderRadius: 12, cursor: "pointer", fontSize: 18, fontWeight: 800, fontFamily: "'Montserrat', sans-serif", boxShadow: `0 6px 25px ${taller.color}40`, display: "inline-flex", alignItems: "center", gap: 10 }}>
                Iniciar Taller →
              </button>
              <div style={{ width: "100%", height: 6, borderRadius: 3, background: `linear-gradient(90deg, ${COLORS.cyan}, ${taller.color})`, marginTop: 40 }} />
            </div>
          ) : (
            <div style={{ maxWidth: 900, margin: "0 auto" }}>
              {activity && (
                <div style={{ marginBottom: 20, padding: "12px 16px", background: "#fff", borderRadius: 10, borderLeft: `4px solid ${taller.color}`, fontSize: 14, color: COLORS.gray, lineHeight: 1.5 }}>
                  {activity.desc}
                </div>
              )}
              {activity && <RenderActivity activityId={activity.id} data={data} setData={setData} />}
            </div>
          )}
        </div>

        <div style={{ background: "#fff", padding: "12px 24px", borderTop: `1px solid ${COLORS.lightGray}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <button onClick={prevActivity} disabled={currentTaller === 0 && showingIntro}
            style={{ ...btnStyle(COLORS.navy), opacity: (currentTaller === 0 && showingIntro) ? 0.3 : 1, padding: "10px 20px" }}>
            ← Anterior
          </button>
          <span style={{ fontSize: 12, color: COLORS.gray }}>
            {showingIntro ? `Taller ${currentTaller + 1} de ${TALLERES.length}` : `Taller ${currentTaller + 1} · Actividad ${currentActivity + 1} de ${taller.actividades.length}`}
          </span>
          <button onClick={nextActivity}
            disabled={currentTaller === TALLERES.length - 1 && !showingIntro && currentActivity === taller.actividades.length - 1}
            style={{ ...btnStyle(COLORS.cyan), opacity: (currentTaller === TALLERES.length - 1 && !showingIntro && currentActivity === taller.actividades.length - 1) ? 0.3 : 1, padding: "10px 20px" }}>
            {showingIntro ? "Iniciar →" : "Siguiente →"}
          </button>
        </div>
      </main>
    </div>
  );
}

// ============================================================
// LOGIN SCREEN
// ============================================================
function LoginScreen({ onLogin }) {
  const [mode, setMode] = useState("login");
  const [empresa, setEmpresa] = useState("");
  const [password, setPassword] = useState("");
  const [email, setEmail] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const handleSubmit = async () => {
    if (!empresa.trim() || !password.trim()) { setError("Por favor llena todos los campos"); return; }
    setLoading(true); setError("");
    if (mode === "register") {
      const res = await apiCall("register", { empresa: empresa.trim(), password, email });
      if (res.success) { onLogin(empresa.trim()); } else { setError(res.error || "Error al registrar"); }
    } else {
      const res = await apiCall("login", { empresa: empresa.trim(), password });
      if (res.success) { onLogin(res.empresa || empresa.trim()); } else { setError(res.error || "Error al iniciar sesión"); }
    }
    setLoading(false);
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: `linear-gradient(135deg, ${COLORS.navy} 0%, #0D1B3E 50%, ${COLORS.lightNavy} 100%)`, fontFamily: "'Montserrat', sans-serif", padding: 20 }}>
      <div style={{ position: "absolute", top: "10%", left: "5%", width: 300, height: 300, borderRadius: "50%", background: COLORS.cyan + "08", filter: "blur(80px)" }} />
      <div style={{ position: "absolute", bottom: "10%", right: "10%", width: 400, height: 400, borderRadius: "50%", background: COLORS.yellow + "06", filter: "blur(100px)" }} />
      <div style={{ background: "rgba(255,255,255,0.97)", borderRadius: 20, padding: "40px 36px", maxWidth: 420, width: "100%", position: "relative", boxShadow: "0 25px 80px rgba(0,0,0,0.4)" }}>
        <div style={{ textAlign: "center", marginBottom: 28 }}>
          <div style={{ fontSize: 40, marginBottom: 8 }}>🚀</div>
          <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.gray, marginBottom: 2 }}>Cámara de Comercio Aburrá Sur</div>
          <div style={{ fontSize: 24, fontWeight: 800, color: COLORS.navy }}><span style={{ color: COLORS.cyan }}>plynn</span></div>
          <div style={{ fontSize: 14, fontWeight: 600, color: COLORS.cyan, marginTop: 2 }}>PLANTILLA INNOVACCIÓN</div>
        </div>
        <div style={{ display: "flex", marginBottom: 24, borderRadius: 10, overflow: "hidden", border: `2px solid ${COLORS.lightGray}` }}>
          {["login", "register"].map(m => (
            <button key={m} onClick={() => { setMode(m); setError(""); }}
              style={{ flex: 1, padding: "10px 0", border: "none", cursor: "pointer", fontFamily: "'Montserrat', sans-serif", fontSize: 13, fontWeight: 700, background: mode === m ? COLORS.navy : "#fff", color: mode === m ? "#fff" : COLORS.gray }}>
              {m === "login" ? "Iniciar Sesión" : "Registrarse"}
            </button>
          ))}
        </div>
        <div>
          <label style={{ display: "block", fontSize: 12, fontWeight: 700, color: COLORS.navy, marginBottom: 6 }}>Nombre de la empresa</label>
          <input value={empresa} onChange={e => setEmpresa(e.target.value)} onKeyDown={e => e.key === "Enter" && handleSubmit()}
            placeholder="Ej: Mi Empresa S.A.S."
            style={{ width: "100%", padding: "12px 16px", borderRadius: 10, border: `2px solid ${COLORS.lightGray}`, fontSize: 15, fontFamily: "'Montserrat', sans-serif", outline: "none", boxSizing: "border-box", marginBottom: 14 }} />
          {mode === "register" && (
            <>
              <label style={{ display: "block", fontSize: 12, fontWeight: 700, color: COLORS.navy, marginBottom: 6 }}>Email (opcional)</label>
              <input value={email} onChange={e => setEmail(e.target.value)} placeholder="correo@empresa.com" type="email"
                style={{ width: "100%", padding: "12px 16px", borderRadius: 10, border: `2px solid ${COLORS.lightGray}`, fontSize: 15, fontFamily: "'Montserrat', sans-serif", outline: "none", boxSizing: "border-box", marginBottom: 14 }} />
            </>
          )}
          <label style={{ display: "block", fontSize: 12, fontWeight: 700, color: COLORS.navy, marginBottom: 6 }}>Contraseña</label>
          <input value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === "Enter" && handleSubmit()}
            placeholder="••••••••" type="password"
            style={{ width: "100%", padding: "12px 16px", borderRadius: 10, border: `2px solid ${COLORS.lightGray}`, fontSize: 15, fontFamily: "'Montserrat', sans-serif", outline: "none", boxSizing: "border-box", marginBottom: 8 }} />
          {error && <div style={{ background: "#FEF2F2", color: COLORS.red, padding: "8px 12px", borderRadius: 8, fontSize: 13, marginTop: 8 }}>{error}</div>}
          <button onClick={handleSubmit} disabled={loading}
            style={{ width: "100%", padding: "14px 0", borderRadius: 12, border: "none", background: loading ? COLORS.gray : `linear-gradient(135deg, ${COLORS.cyan}, ${COLORS.lightNavy})`, color: "#fff", fontSize: 16, fontWeight: 800, cursor: loading ? "wait" : "pointer", fontFamily: "'Montserrat', sans-serif", marginTop: 16 }}>
            {loading ? "Conectando..." : mode === "login" ? "Entrar →" : "Registrar empresa →"}
          </button>
        </div>
        <div style={{ textAlign: "center", marginTop: 20, fontSize: 11, color: COLORS.gray }}>
          {mode === "login" ? "Tu progreso se guarda automáticamente en la nube." : "Registra tu empresa para guardar el progreso del Programa INNOVACCIÓN."}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// APP WRAPPER
// ============================================================
function AppWrapper() {
  const [user, setUser] = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    const savedUser = localStorage.getItem("innovaccion_user");
    if (savedUser) setUser(savedUser);
    setChecking(false);
  }, []);

  const handleLogin = (empresa) => { localStorage.setItem("innovaccion_user", empresa); setUser(empresa); };
  const handleLogout = () => { localStorage.removeItem("innovaccion_user"); setUser(null); };

  if (checking) {
    return (
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", fontFamily: "'Montserrat', sans-serif", background: COLORS.navy, color: "#fff" }}>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>🚀</div>
          <div style={{ fontSize: 20, fontWeight: 700 }}>Cargando INNOVACCIÓN...</div>
        </div>
      </div>
    );
  }

  if (!user) return <LoginScreen onLogin={handleLogin} />;
  return <InnovaccionApp user={user} onLogout={handleLogout} />;
}

// ============================================================
// MOUNT
// ============================================================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(AppWrapper));
  </script>
</body>
