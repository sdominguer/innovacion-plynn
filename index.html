const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvHvdG6J6ekLxrFS4ugpaxsx6BXgGCmniGcfN-NI449RZ8wDKvhX-fL2qXgRMdVbeP/exec";

async function apiCall(action, params = {}) {
  const USE_LOCAL = !APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes("TU_URL");
  const BACKEND_ACTIONS = ["login", "register", "save", "load", "resetPassword", "verifyCode", "updatePassword"];
 
  if (!USE_LOCAL && BACKEND_ACTIONS.includes(action)) {
    try {
      let url = APPS_SCRIPT_URL + "?action=" + encodeURIComponent(action);
      for (const [key, val] of Object.entries(params)) {
        if (key === "datos") url += "&payload=" + encodeURIComponent(JSON.stringify(val));
        else url += "&" + encodeURIComponent(key) + "=" + encodeURIComponent(val);
      }
      const res = await fetch(url);
      const result = await res.json();
      if (action === "save" && result.success) {
        try {
          const toSave = params.datos || {};
          localStorage.setItem(STORAGE_KEY + "_" + params.empresa, JSON.stringify(toSave));
        } catch (e) {}
      }
      return result;
    } catch (e) {
      if (action === "resetPassword" || action === "verifyCode") {
        return { success: false, error: "No se pudo conectar al servidor. Verifica tu conexión." };
      }
    }
  }
 
  if (action === "login") {
    const stored = localStorage.getItem("user_" + params.empresa);
    if (!stored) return { success: false, error: "Empresa no registrada. Regístrate primero." };
    const u = JSON.parse(stored);
    if (u.password !== params.password) return { success: false, error: "Contraseña incorrecta." };
    return { success: true, empresa: params.empresa };
  }
  if (action === "register") {
    const existing = localStorage.getItem("user_" + params.empresa);
    if (existing) return { success: false, error: "Esta empresa ya está registrada. Inicia sesión." };
    localStorage.setItem("user_" + params.empresa, JSON.stringify({ password: params.password, email: params.email || "" }));
    return { success: true };
  }
  if (action === "load") {
    const raw = localStorage.getItem(STORAGE_KEY + "_" + params.empresa);
    if (raw) return { success: true, datos: JSON.parse(raw) };
    return { success: true, datos: {} };
  }
  if (action === "save") { return { success: true }; }
  if (action === "resetPassword") {
    return { success: false, error: "La recuperación de contraseña requiere conexión al servidor." };
  }
  if (action === "verifyCode") {
    return { success: false, error: "La verificación del código requiere conexión al servidor." };
  }
  return { success: true };
}

function PostIt({ text, tipo = "necesidad", onDelete, onChange, editable = true }) {
  const colors = {
    problema: { bg: "#FF6B6B", text: "#fff" },
    necesidad: { bg: "#FFD93D", text: "#333" },
    oportunidad: { bg: "#6BCB77", text: "#fff" },
  };
  const c = colors[tipo] || colors.necesidad;
  const rotation = useRef(Math.random() * 4 - 2).current;
  return (
    <div style={{
      background: c.bg, color: c.text, padding: "10px 12px", borderRadius: 4,
      width: 140, minHeight: 90, position: "relative",
      boxShadow: "2px 3px 8px rgba(0,0,0,0.15)", fontFamily: "'Caveat', cursive",
      fontSize: 15, display: "flex", alignItems: "center", justifyContent: "center",
      transform: `rotate(${rotation}deg)`,
    }}>
      {editable ? (
        <textarea
          value={text}
          onChange={e => onChange(e.target.value)}
          placeholder="Escribe aquí..."
          style={{
            background: "transparent", border: "none", color: c.text,
            width: "100%", minHeight: 60, resize: "none", fontFamily: "inherit",
            fontSize: "inherit", textAlign: "center", outline: "none",
            cursor: "text", caretColor: c.text,
          }}
        />
      ) : <span>{text}</span>}
      {onDelete && (
        <button onClick={onDelete} style={{
          position: "absolute", top: 2, right: 4, background: "none",
          border: "none", cursor: "pointer", fontSize: 14, opacity: 0.6,
          color: c.text,
        }}>✕</button>
      )}
    </div>
  );
}

// RETO POST-IT — componente con estado local para evitar pérdida de foco
// ============================================================
function RetoPostIt({ text, tipo, onTextChange, onTipoChange, onDelete }) {
  const [localText, setLocalText] = useState(text);
  const saveTimeout = useRef(null);
  const colors = {
    problema: { bg: "#FF6B6B", text: "#fff" },
    necesidad: { bg: "#FFD93D", text: "#333" },
    oportunidad: { bg: "#6BCB77", text: "#fff" },
  };
  const c = colors[tipo] || colors.necesidad;
  const rotation = useRef(Math.random() * 4 - 2).current;

  const handleChange = (val) => {
    setLocalText(val);
    // Debounce the parent update to avoid re-renders while typing
    if (saveTimeout.current) clearTimeout(saveTimeout.current);
    saveTimeout.current = setTimeout(() => {
      onTextChange(val);
    }, 400);
  };

  return (
    <div style={{ position: "relative", marginTop: 10 }}>
      <select value={tipo} onChange={e => onTipoChange(e.target.value)}
        style={{ position: "absolute", top: -8, left: 2, fontSize: 10, border: "none", background: "transparent", zIndex: 2, cursor: "pointer" }}>
        <option value="problema">🔴</option>
        <option value="necesidad">🟡</option>
        <option value="oportunidad">🟢</option>
      </select>
      <div style={{
        background: c.bg, color: c.text, padding: "10px 12px", borderRadius: 4,
        width: 140, minHeight: 90, position: "relative",
        boxShadow: "2px 3px 8px rgba(0,0,0,0.15)", fontFamily: "'Caveat', cursive",
        fontSize: 15, display: "flex", alignItems: "center", justifyContent: "center",
        transform: `rotate(${rotation}deg)`,
      }}>
        <textarea
          value={localText}
          onChange={e => handleChange(e.target.value)}
          placeholder="Escribe aquí..."
          style={{
            background: "transparent", border: "none", color: c.text,
            width: "100%", minHeight: 60, resize: "none", fontFamily: "inherit",
            fontSize: "inherit", textAlign: "center", outline: "none",
            cursor: "text", caretColor: c.text,
          }}
        />
        <button onClick={onDelete} style={{
          position: "absolute", top: 2, right: 4, background: "none",
          border: "none", cursor: "pointer", fontSize: 14, opacity: 0.6, color: c.text,
        }}>✕</button>
      </div>
    </div>
  );
}

function RetoColumn({ title, subtitle, retos, onAdd, onUpdate, onDelete }) {
  return (

        {retos.map((r, i) => (
          <RetoPostIt
            key={r.id || i}
            text={r.text}
            tipo={r.tipo}

      </div>
    </div>
  );
}

// ─── IDEA POSTIT (same pattern) ─────────────────────────────
function IdeaPostIt({ text, tipo, onTextChange, onTipoChange, onDelete }) {
  const [local, setLocal] = useState(text);
  const t = useRef(null);
  const rot = useRef(Math.random() * 4 - 2).current;
  const cols = { problema: { bg: "#FF6B6B", txt: "#fff" }, necesidad: { bg: "#FFD93D", txt: "#333" }, oportunidad: { bg: "#6BCB77", txt: "#fff" } };
  const c = cols[tipo] || cols.necesidad;
  const handle = v => { setLocal(v); clearTimeout(t.current); t.current = setTimeout(() => onTextChange(v), 350); };
  return (
    <div style={{ position: "relative", marginTop: 10 }}>
      <select value={tipo} onChange={e => onTipoChange(e.target.value)} style={{ position: "absolute", top: -8, left: 2, fontSize: 10, border: "none", background: "transparent", zIndex: 2, cursor: "pointer" }}>
        <option value="problema">🔴</option><option value="necesidad">🟡</option><option value="oportunidad">🟢</option>
      </select>
      <div style={{ background: c.bg, color: c.txt, padding: "10px 12px", borderRadius: 4, width: 140, minHeight: 90, position: "relative", boxShadow: "2px 3px 8px rgba(0,0,0,0.15)", fontFamily: "'Caveat', cursive", fontSize: 15, display: "flex", alignItems: "center", justifyContent: "center", transform: `rotate(${rot}deg)` }}>
        <textarea value={local} onChange={e => handle(e.target.value)} placeholder="Escribe aquí..." style={{ background: "transparent", border: "none", color: c.txt, width: "100%", minHeight: 60, resize: "none", fontFamily: "inherit", fontSize: "inherit", textAlign: "center", outline: "none", cursor: "text", caretColor: c.txt }} />

    </div>
  );
}

function generatePDFContent(data) {
  const logoHtml = data.empresa.logo ? `<img src="${data.empresa.logo}" style="max-height:70px;max-width:160px;object-fit:contain;"/>` : "";
  const orgImg = data.organigramaImg ? `<img src="${data.organigramaImg}" style="max-width:100%;border-radius:8px;margin-top:8px;"/>` : "";
  const pmvEvidencia = data.pmv.evidenciasArchivo ? `<img src="${data.pmv.evidenciasArchivo}" style="max-width:100%;border-radius:8px;margin-top:8px;"/>` : "";

  const sec = (title, icon, content) => `
    <div style="margin-bottom:28px;page-break-inside:avoid;">
      <h2 style="color:#1A2E4A;border-bottom:3px solid #00A0B0;padding-bottom:8px;font-family:Arial,sans-serif;font-size:16px;margin-bottom:12px;">${icon} ${title}</h2>
      ${content}
    </div>`;
  const row = (l, v) => v ? `<p style="margin:5px 0;font-size:13px;"><strong style="color:#1A2E4A;">${l}:</strong> ${v}</p>` : "";
  const tbl = (headers, rows) => `
    <table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;">
      <thead><tr style="background:#1A2E4A;color:#fff;">${headers.map(h=>`<th style="padding:7px 8px;text-align:left;">${h}</th>`).join("")}</tr></thead>
      <tbody>${rows.map((r,i)=>`<tr style="background:${i%2?"#f5f7fa":"#fff"};border-bottom:1px solid #eee;">${r.map(c=>`<td style="padding:6px 8px;">${c||""}</td>`).join("")}</tr>`).join("")}</tbody>
    </table>`;
  const chip = (text, tipo) => `<span style="background:${tipo==="problema"?"#FF6B6B":tipo==="oportunidad"?"#6BCB77":"#FFD93D"};color:${tipo==="necesidad"?"#333":"#fff"};padding:3px 10px;border-radius:4px;margin:2px;display:inline-block;font-size:12px;">${text}</span>`;

  return `<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8">
<title>Informe INNOVACCIÓN — ${data.empresa.nombre}</title>
<style>
  body{font-family:Arial,sans-serif;max-width:820px;margin:0 auto;padding:32px;color:#222;font-size:13px;line-height:1.6;}
  h1,h2,h3{font-family:Arial,sans-serif;}
  table{width:100%;border-collapse:collapse;}
  @page{margin:20mm;}
</style>
</head>
<body>

<div style="background:#1A2E4A;color:#fff;padding:28px 32px;border-radius:12px;margin-bottom:32px;text-align:center;">
  ${logoHtml ? `<div style="margin-bottom:12px;">${logoHtml}</div>` : ""}
  <div style="font-size:12px;opacity:0.7;text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;">Cámara de Comercio Aburrá Sur · PLYNN</div>
  <h1 style="color:#00A0B0;margin:0;font-size:26px;">INFORME PLANTILLA INNOVACCIÓN V3</h1>
  <div style="font-size:16px;font-weight:700;margin-top:8px;">${data.empresa.nombre || "—"}</div>
  <div style="font-size:12px;opacity:0.6;margin-top:4px;">Generado el ${new Date().toLocaleDateString("es-CO")}</div>
</div>

${sec("Datos de la Empresa","🏢",`
  ${row("Nombre",data.empresa.nombre)}
  ${row("Sector",data.empresa.sector)}
  ${row("N° de empleados",data.empresa.empleados)}
  ${row("Productos / Servicios",data.empresa.productos)}
`)}

${sec("Comité de Innovación","👥",`
  ${tbl(["Departamento","Nombre del Director"],data.comite.map(m=>[m.departamento,m.nombre]))}
  ${row("Líder de Innovación",data.liderInnovacion)}
  <h3 style="color:#1A2E4A;font-size:14px;margin-top:16px;">Organigrama con Innovación Jerarquizada</h3>
  ${row("Descripción",data.organigrama)}
  ${orgImg}

async function downloadPDF(data) {
  const htmlContent = generatePDFContent(data);
  if (window.html2pdf) {
    const container = document.createElement("div");
    container.innerHTML = htmlContent;
    document.body.appendChild(container);
    const opt = {
      margin: [10, 10, 10, 10],
      filename: `INNOVACCION_${data.empresa.nombre || "empresa"}_${new Date().toISOString().slice(0,10)}.pdf`,
      image: { type: "jpeg", quality: 0.95 },
      html2canvas: { scale: 2, useCORS: true, letterRendering: true },
      jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
    };
    try {
      await window.html2pdf().set(opt).from(container).save();
    } finally {
      document.body.removeChild(container);
    }
  } else {
    // Fallback: open in new window for manual print-to-PDF
    const w = window.open("", "_blank");
    w.document.write(htmlContent);
    w.document.close();
    setTimeout(() => w.print(), 800);
  }
}

// ─── PROGRESS CALC ──────────────────────────────────────────
function calcProgress(data) {
  const checks = [];
  // Datos empresa
  checks.push(!!data.empresa.nombre, !!data.empresa.sector, !!data.empresa.empleados, !!data.empresa.productos);
  // Comité
  checks.push(data.comite.some(m => m.nombre), !!data.liderInnovacion, !!data.acta.fecha);
  // Canvas
  Object.values(data.canvas).forEach(v => checks.push(!!v));
  // Focos
  checks.push(data.focos.some(f => f.porcentaje));
  // Estrategia
  checks.push(!!data.estrategiaInnovacion, !!data.objetivosEstrategicos);
  // Retos
  checks.push(data.retosInternos.length > 0 || data.retosCadena.length > 0 || data.retosSector.length > 0);
  checks.push(data.retosEvaluados.some(r => r.nombre));
  checks.push(!!data.retoAbierto);
  // Ideas
  checks.push(data.ideasPorReto.some(arr => arr.length > 0));
  checks.push(!!data.ideaContinua);
  // PMV
  checks.push(!!data.pmv.reto, !!data.pmv.idea, !!data.pmv.funcionalidades);
  checks.push(!!data.validacionPMV.conclusiones);
  // VT
  checks.push(!!data.vt.tema, !!data.vt.informe);
  // Propiedad industrial
  checks.push(data.propiedadIndustrial.some(p => p.pmv));
  // Difusión
  checks.push(!!data.planDifusion);
  // Cultura
  checks.push(!!data.programaCultura);
  // Indicadores
  checks.push(data.indicadores.some(i => i.nombre));
  const filled = checks.filter(Boolean).length;
  return Math.round((filled / checks.length) * 100);
}

function getMissingActivities(data) {
  const missing = [];
  if (!data.empresa.nombre) missing.push("Nombre de la empresa");
  if (!data.empresa.sector) missing.push("Sector de la empresa");
  if (!data.liderInnovacion) missing.push("Líder de Innovación");
  if (!data.acta.fecha) missing.push("Acta del Comité");
  if (!data.canvas.propuestaValor) missing.push("Business Model Canvas");
  if (!data.focos.some(f => f.porcentaje)) missing.push("Focos de Innovación");
  if (!data.estrategiaInnovacion) missing.push("Estrategia de Innovación");
  if (!data.retosEvaluados.some(r => r.nombre)) missing.push("Evaluar Retos");
  if (!data.ideaContinua) missing.push("Idea que Continúa");
  if (!data.pmv.funcionalidades) missing.push("Construir el PMV");
  if (!data.validacionPMV.conclusiones) missing.push("Validar el PMV");
  if (!data.vt.tema) missing.push("Diagnóstico VT");
  if (!data.vt.informe) missing.push("Informe VT");
  if (!data.planDifusion) missing.push("Plan de Difusión");
  if (!data.programaCultura) missing.push("Cultura de Innovación");
  if (!data.indicadores.some(i => i.nombre)) missing.push("Indicadores");
  return missing;
}

            {data.empresa.nombre && <span style={{ fontSize: 12, color: COLORS.navy, fontWeight: 600, background: COLORS.lightCyan, padding: "4px 10px", borderRadius: 20 }}>{data.empresa.nombre}</span>}
          </div>
        </header>

        <div style={{ flex: 1, overflowY: "auto", padding: "20px 24px 100px" }}>
          {showIntro ? (
            <div style={{ maxWidth: 640, margin: "0 auto", textAlign: "center", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "60vh" }}>
              <div style={{ width: "100%", height: 5, borderRadius: 3, background: `linear-gradient(90deg, ${taller.color}, ${COLORS.cyan})`, marginBottom: 36 }} />
              <div style={{ width: 76, height: 76, borderRadius: "50%", background: taller.color, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 34, marginBottom: 18, boxShadow: `0 8px 30px ${taller.color}40` }}>{taller.icon}</div>
              <div style={{ fontSize: 12, fontWeight: 700, color: taller.color, textTransform: "uppercase", letterSpacing: 3, marginBottom: 6 }}>Taller {ct+1} de {TALLERES.length}</div>
              <h1 style={{ fontSize: 28, fontWeight: 800, color: COLORS.navy, margin: "0 0 14px", fontFamily: "'Montserrat', sans-serif" }}>{taller.titulo}</h1>
              <p style={{ fontSize: 15, color: COLORS.gray, lineHeight: 1.7, maxWidth: 480, margin: "0 0 28px" }}>{taller.intro}</p>
              <div style={{ background: "#fff", borderRadius: 12, padding: "14px 18px", width: "100%", maxWidth: 420, textAlign: "left", border: `1px solid ${COLORS.lightGray}`, marginBottom: 28 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: COLORS.navy, marginBottom: 8, textTransform: "uppercase", letterSpacing: 1 }}>Actividades</div>
                {taller.actividades.map((a,i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 9, padding: "7px 0", borderBottom: i<taller.actividades.length-1?`1px solid ${COLORS.lightGray}`:"none" }}>
                    <div style={{ width: 24, height: 24, borderRadius: "50%", background: taller.color+"20", color: taller.color, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 800, flexShrink: 0 }}>{i+1}</div>
                    <div><div style={{ fontSize: 13, fontWeight: 600, color: COLORS.navy }}>{a.titulo}</div><div style={{ fontSize: 11, color: COLORS.gray }}>{a.desc}</div></div>
                  </div>
                ))}
              </div>
              <button onClick={() => { setShowIntro(false); setCa(0); }} style={{ background: taller.color, color: "#fff", border: "none", padding: "14px 44px", borderRadius: 10, cursor: "pointer", fontSize: 17, fontWeight: 800, fontFamily: "'Montserrat', sans-serif", boxShadow: `0 6px 25px ${taller.color}40` }}>
                Iniciar Taller →
              </button>
              <div style={{ width: "100%", height: 5, borderRadius: 3, background: `linear-gradient(90deg, ${COLORS.cyan}, ${taller.color})`, marginTop: 36 }} />
            </div>
          ) : (
            <div style={{ maxWidth: 900, margin: "0 auto" }}>
              {activity && <div style={{ marginBottom: 18, padding: "10px 14px", background: "#fff", borderRadius: 10, borderLeft: `4px solid ${taller.color}`, fontSize: 14, color: COLORS.gray }}>{activity.desc}</div>}
              {activity && <Activity id={activity.id} data={data} setData={setData} />}

              {/* Botón final + resumen de pendientes */}
              {isLastActivity && (
                <div style={{ marginTop: 32, padding: 24, background: "#fff", borderRadius: 16, border: `2px solid ${COLORS.cyan}`, boxShadow: "0 4px 20px rgba(0,160,176,0.1)" }}>
                  <div style={{ textAlign: "center", marginBottom: 20 }}>
                    <div style={{ fontSize: 36, marginBottom: 8 }}>{progress === 100 ? "🎉" : "📋"}</div>
                    <div style={{ fontSize: 20, fontWeight: 800, color: COLORS.navy, marginBottom: 4 }}>
                      {progress === 100 ? "¡Plantilla completada al 100%!" : `Progreso actual: ${progress}%`}
                    </div>
                    {missing.length > 0 && (
                      <div style={{ textAlign: "left", marginTop: 16, background: "#FFF9EC", border: "1px solid #F0D98C", borderRadius: 10, padding: "14px 16px" }}>
                        <div style={{ fontWeight: 700, color: COLORS.navy, marginBottom: 8 }}>⚠️ Actividades pendientes por completar:</div>
                        {missing.map((m,i) => <div key={i} style={{ fontSize: 13, color: "#7F4F00", padding: "3px 0" }}>• {m}</div>)}
                      </div>
                    )}
                  </div>
                  <button onClick={handleGeneratePDF} disabled={generating}
                    style={{ width: "100%", padding: "16px", borderRadius: 12, border: "none", background: generating?"#ccc":`linear-gradient(135deg, ${COLORS.navy}, ${COLORS.cyan})`, color: "#fff", fontSize: 18, fontWeight: 800, cursor: generating?"wait":"pointer", fontFamily: "'Montserrat', sans-serif", boxShadow: "0 6px 25px rgba(0,160,176,0.3)" }}>
                    {generating ? "⏳ Generando informe PDF..." : "📄 Terminar y Generar Informe en PDF"}
                  </button>
                </div>
              )}
            </div>
          )}
        </div>

        <div style={{ background: "#fff", padding: "11px 22px", borderTop: `1px solid ${COLORS.lightGray}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <button onClick={prev} disabled={ct===0&&showIntro} style={{ ...btnStyle(COLORS.navy), opacity: ct===0&&showIntro?0.3:1, padding: "10px 20px" }}>← Anterior</button>
          <span style={{ fontSize: 12, color: COLORS.gray }}>
            {showIntro ? `Taller ${ct+1} de ${TALLERES.length}` : `Taller ${ct+1} · Actividad ${ca+1} de ${taller.actividades.length}`}
          </span>
          {isLastActivity
            ? <button onClick={handleGeneratePDF} disabled={generating} style={{ ...btnStyle(COLORS.cyan), padding: "10px 20px", opacity: generating?0.7:1 }}>{generating?"⏳ Generando...":"📄 Generar PDF"}</button>
            : <button onClick={next} style={{ ...btnStyle(COLORS.cyan), padding: "10px 20px" }}>{showIntro?"Iniciar →":"Siguiente →"}</button>
          }
        </div>
      </main>
    </div>
  );
}

// LOGIN SCREEN
// ============================================================
function LoginScreen({ onLogin }) {
  const [mode, setMode] = useState("login");
  const [empresa, setEmpresa] = useState("");
  const [password, setPassword] = useState("");
  const [email, setEmail] = useState("");
  const [code, setCode] = useState("");
  const [newPassword, setNewPassword] = useState("");
  const [confirmPassword, setConfirmPassword] = useState("");
  const [error, setError] = useState("");
  const [success, setSuccess] = useState("");
  const [loading, setLoading] = useState(false);
 
  const switchMode = (m) => { setMode(m); setError(""); setSuccess(""); };
 
  const handleSubmit = async () => {
    setError(""); setSuccess("");
 
    if (mode === "login") {
      if (!empresa.trim() || !password.trim()) { setError("Por favor llena todos los campos"); return; }
      setLoading(true);
      const res = await apiCall("login", { empresa: empresa.trim(), password });
      if (res.success) { onLogin(res.empresa || empresa.trim()); }
      else { setError(res.error || "Error al iniciar sesión"); }
      setLoading(false);
    }
 
    else if (mode === "register") {
      if (!empresa.trim() || !password.trim()) { setError("Por favor llena todos los campos"); return; }
      if (!email.trim()) { setError("El correo electrónico es obligatorio para poder recuperar tu contraseña en el futuro"); return; }
      if (password.length < 4) { setError("La contraseña debe tener mínimo 4 caracteres"); return; }
      setLoading(true);
      const res = await apiCall("register", { empresa: empresa.trim(), password, email: email.trim() });
      if (res.success) { onLogin(empresa.trim()); }
      else { setError(res.error || "Error al registrar"); }
      setLoading(false);
    }
 
    else if (mode === "forgot") {
      if (!empresa.trim()) { setError("Escribe el nombre de tu empresa"); return; }
      if (!email.trim()) { setError("Escribe el correo electrónico con el que te registraste"); return; }
      setLoading(true);
      const res = await apiCall("resetPassword", { empresa: empresa.trim(), email: email.trim() });
      if (res.success) {
        setSuccess(res.message || "Código enviado a tu correo.");
        setMode("newpass");
      } else {
        setError(res.error || "No se pudo enviar el código.");
      }
      setLoading(false);
    }
 
    else if (mode === "newpass") {
      if (!code.trim()) { setError("Ingresa el código de 6 dígitos que recibiste por correo"); return; }
      if (!newPassword.trim()) { setError("Escribe tu nueva contraseña"); return; }
      if (newPassword.length < 4) { setError("La nueva contraseña debe tener mínimo 4 caracteres"); return; }
      if (newPassword !== confirmPassword) { setError("Las contraseñas no coinciden"); return; }
      setLoading(true);
      const res = await apiCall("verifyCode", { empresa: empresa.trim(), code: code.trim(), newPassword });
      if (res.success) {
        setSuccess(res.message || "Contraseña actualizada. Ya puedes iniciar sesión.");
        setTimeout(() => { switchMode("login"); setPassword(""); }, 2500);
      } else {
        setError(res.error || "Error al verificar el código.");
      }
      setLoading(false);
    }
  };
 
  const loginInputStyle = {
    width: "100%", padding: "12px 16px", borderRadius: 10,
    border: "2px solid #E5E7EB", fontSize: 15,
    fontFamily: "'Montserrat', sans-serif", outline: "none",
    boxSizing: "border-box", marginBottom: 14,
    transition: "border-color 0.2s",
  };
 
  return (
    <div style={{
      minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
      background: "linear-gradient(135deg, #1A2E4A 0%, #0D1B3E 50%, #223D5E 100%)",
      fontFamily: "'Montserrat', sans-serif", padding: "40px 20px",
      overflowY: "auto", boxSizing: "border-box",
    }}>
      <div style={{ position: "fixed", top: "10%", left: "5%", width: 300, height: 300, borderRadius: "50%", background: "rgba(0,160,176,0.03)", filter: "blur(80px)", pointerEvents: "none" }} />
      <div style={{ position: "fixed", bottom: "10%", right: "10%", width: 400, height: 400, borderRadius: "50%", background: "rgba(245,166,35,0.02)", filter: "blur(100px)", pointerEvents: "none" }} />
 
      <div style={{
        background: "rgba(255,255,255,0.97)", borderRadius: 20, padding: "32px 28px",
        maxWidth: 420, width: "100%", position: "relative",
        boxShadow: "0 25px 80px rgba(0,0,0,0.4)",
        marginTop: "auto", marginBottom: "auto", flexShrink: 0,
      }}>
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <div style={{ fontSize: 36, marginBottom: 6 }}>🚀</div>
          <div style={{ fontSize: 11, fontWeight: 600, color: "#6B7280", marginBottom: 2 }}>Cámara de Comercio Aburrá Sur</div>
          <div style={{ fontSize: 22, fontWeight: 800, color: "#1A2E4A" }}><span style={{ color: "#00A0B0" }}>plynn</span></div>
          <div style={{ fontSize: 13, fontWeight: 600, color: "#00A0B0", marginTop: 2 }}>PLANTILLA INNOVACCIÓN</div>
        </div>
 
        {(mode === "login" || mode === "register") && (
          <div>
            <div style={{ display: "flex", marginBottom: 20, borderRadius: 10, overflow: "hidden", border: "2px solid #E5E7EB" }}>
              {["login", "register"].map(m => (
                <button key={m} onClick={() => switchMode(m)}
                  style={{ flex: 1, padding: "10px 0", border: "none", cursor: "pointer", fontFamily: "'Montserrat', sans-serif", fontSize: 13, fontWeight: 700, background: mode === m ? "#1A2E4A" : "#fff", color: mode === m ? "#fff" : "#6B7280" }}>
                  {m === "login" ? "Iniciar Sesión" : "Registrarse"}
                </button>
              ))}
            </div>
            <div>
              <label style={{ display: "block", fontSize: 12, fontWeight: 700, color: "#1A2E4A", marginBottom: 6 }}>Nombre de la empresa</label>
              <input value={empresa} onChange={e => setEmpresa(e.target.value)} onKeyDown={e => e.key === "Enter" && handleSubmit()}
                placeholder="Ej: Mi Empresa S.A.S." style={loginInputStyle} />
              {mode === "register" && (
                <div>
                  <label style={{ display: "block", fontSize: 12, fontWeight: 700, color: "#1A2E4A", marginBottom: 6 }}>
                    Correo electrónico <span style={{ color: "#E53935" }}>*</span>
                  </label>
                  <div style={{ fontSize: 11, color: "#9CA3AF", marginBottom: 6 }}>Necesario para recuperar tu contraseña en el futuro</div>
                  <input value={email} onChange={e => setEmail(e.target.value)} placeholder="correo@empresa.com" type="email" style={loginInputStyle} />
                </div>
              )}
              <label style={{ display: "block", fontSize: 12, fontWeight: 700, color: "#1A2E4A", marginBottom: 6 }}>Contraseña</label>
              <input value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === "Enter" && handleSubmit()}
                placeholder="••••••••" type="password" style={loginInputStyle} />
              {error && <div style={{ background: "#FEF2F2", color: "#E53935", padding: "8px 12px", borderRadius: 8, fontSize: 13, marginTop: 8 }}>{error}</div>}
              <button onClick={handleSubmit} disabled={loading}
                style={{ width: "100%", padding: "14px 0", borderRadius: 12, border: "none", background: loading ? "#6B7280" : "linear-gradient(135deg, #00A0B0, #223D5E)", color: "#fff", fontSize: 16, fontWeight: 800, cursor: loading ? "wait" : "pointer", fontFamily: "'Montserrat', sans-serif", marginTop: 16 }}>
                {loading ? "Conectando..." : mode === "login" ? "Entrar →" : "Registrar empresa →"}
              </button>
              {mode === "login" && (
                <div style={{ textAlign: "center", marginTop: 16 }}>
                  <button onClick={() => switchMode("forgot")}
                    style={{ background: "none", border: "none", cursor: "pointer", fontFamily: "'Montserrat', sans-serif", fontSize: 13, color: "#00A0B0", fontWeight: 600, textDecoration: "underline", padding: 0 }}>
                    ¿Olvidaste tu contraseña?
                  </button>
                </div>
              )}
            </div>
            <div style={{ textAlign: "center", marginTop: 16, fontSize: 11, color: "#6B7280" }}>
              {mode === "login" ? "Tu progreso se guarda automáticamente en la nube." : "Registra tu empresa para guardar el progreso del Programa INNOVACCIÓN."}
            </div>
          </div>
        )}
 
        {mode === "forgot" && (
          <div>
            <div style={{ textAlign: "center", marginBottom: 20 }}>
              <div style={{ width: 52, height: 52, borderRadius: "50%", background: "rgba(0,160,176,0.1)", display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 24, marginBottom: 10 }}>🔑</div>
              <div style={{ fontSize: 17, fontWeight: 800, color: "#1A2E4A" }}>Recuperar contraseña</div>
              <div style={{ fontSize: 12, color: "#6B7280", marginTop: 6, lineHeight: 1.5 }}>Ingresa el nombre de tu empresa y el correo con el que te registraste. Te enviaremos un código.</div>
            </div>
            <label style={{ display: "block", fontSize: 12, fontWeight: 700, color: "#1A2E4A", marginBottom: 6 }}>Nombre de la empresa</label>
            <input value={empresa} onChange={e => setEmpresa(e.target.value)} onKeyDown={e => e.key === "Enter" && handleSubmit()}
              placeholder="Ej: Mi Empresa S.A.S." style={loginInputStyle} />
            <label style={{ display: "block", fontSize: 12, fontWeight: 700, color: "#1A2E4A", marginBottom: 6 }}>Correo electrónico registrado</label>
            <input value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key === "Enter" && handleSubmit()}
              placeholder="correo@empresa.com" type="email" style={loginInputStyle} />
            {error && <div style={{ background: "#FEF2F2", color: "#E53935", padding: "8px 12px", borderRadius: 8, fontSize: 13, marginBottom: 8 }}>{error}</div>}
            {success && <div style={{ background: "#ECFDF5", color: "#059669", padding: "8px 12px", borderRadius: 8, fontSize: 13, marginBottom: 8 }}>{success}</div>}
            <button onClick={handleSubmit} disabled={loading}
              style={{ width: "100%", padding: "14px 0", borderRadius: 12, border: "none", background: loading ? "#6B7280" : "linear-gradient(135deg, #00A0B0, #223D5E)", color: "#fff", fontSize: 15, fontWeight: 800, cursor: loading ? "wait" : "pointer", fontFamily: "'Montserrat', sans-serif", marginTop: 8 }}>
              {loading ? "Enviando código..." : "Enviar código →"}
            </button>
            <div style={{ textAlign: "center", marginTop: 16 }}>
              <button onClick={() => switchMode("login")}
                style={{ background: "none", border: "none", cursor: "pointer", fontFamily: "'Montserrat', sans-serif", fontSize: 13, color: "#6B7280", fontWeight: 500, padding: 0 }}>
                ← Volver a iniciar sesión
              </button>
            </div>
          </div>
        )}
 
        {mode === "newpass" && (
          <div>
            <div style={{ textAlign: "center", marginBottom: 20 }}>
              <div style={{ width: 52, height: 52, borderRadius: "50%", background: "rgba(52,199,89,0.1)", display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 24, marginBottom: 10 }}>📧</div>
              <div style={{ fontSize: 17, fontWeight: 800, color: "#1A2E4A" }}>Ingresa el código</div>
              <div style={{ fontSize: 12, color: "#6B7280", marginTop: 6, lineHeight: 1.5 }}>Revisa tu correo (también spam). Ingresa el código de 6 dígitos y crea tu nueva contraseña.</div>
            </div>
            {success && <div style={{ background: "#ECFDF5", color: "#059669", padding: "10px 14px", borderRadius: 8, fontSize: 13, marginBottom: 14, textAlign: "center", fontWeight: 600 }}>{success}</div>}
            <label style={{ display: "block", fontSize: 12, fontWeight: 700, color: "#1A2E4A", marginBottom: 6 }}>Código de verificación</label>
            <input value={code} onChange={e => { const v = e.target.value.replace(/\D/g, "").slice(0, 6); setCode(v); }}
              placeholder="000000" maxLength={6}
              style={{ ...loginInputStyle, textAlign: "center", fontSize: 26, fontWeight: 800, letterSpacing: 8, padding: "14px" }}
              onKeyDown={e => e.key === "Enter" && handleSubmit()} />
            <label style={{ display: "block", fontSize: 12, fontWeight: 700, color: "#1A2E4A", marginBottom: 6 }}>Nueva contraseña</label>
            <input value={newPassword} onChange={e => setNewPassword(e.target.value)}
              placeholder="Mínimo 4 caracteres" type="password" style={loginInputStyle} />
            <label style={{ display: "block", fontSize: 12, fontWeight: 700, color: "#1A2E4A", marginBottom: 6 }}>Confirmar nueva contraseña</label>
            <input value={confirmPassword} onChange={e => setConfirmPassword(e.target.value)}
              placeholder="Repite la contraseña" type="password" style={loginInputStyle}
              onKeyDown={e => e.key === "Enter" && handleSubmit()} />
            {error && <div style={{ background: "#FEF2F2", color: "#E53935", padding: "8px 12px", borderRadius: 8, fontSize: 13, marginBottom: 8 }}>{error}</div>}
            <button onClick={handleSubmit} disabled={loading}
              style={{ width: "100%", padding: "14px 0", borderRadius: 12, border: "none", background: loading ? "#6B7280" : "linear-gradient(135deg, #34C759, #1A2E4A)", color: "#fff", fontSize: 15, fontWeight: 800, cursor: loading ? "wait" : "pointer", fontFamily: "'Montserrat', sans-serif", marginTop: 8 }}>
              {loading ? "Verificando..." : "Cambiar contraseña →"}
            </button>
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 14 }}>
              <button onClick={() => switchMode("forgot")}
                style={{ background: "none", border: "none", cursor: "pointer", fontFamily: "'Montserrat', sans-serif", fontSize: 12, color: "#00A0B0", fontWeight: 500, padding: 0 }}>
                Reenviar código
              </button>
              <button onClick={() => switchMode("login")}
                style={{ background: "none", border: "none", cursor: "pointer", fontFamily: "'Montserrat', sans-serif", fontSize: 12, color: "#6B7280", fontWeight: 500, padding: 0 }}>
                Volver al inicio
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


function AppWrapper() {
  const [user, setUser] = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    const savedUser = localStorage.getItem("innovaccion_user");
    if (savedUser) setUser(savedUser);
    setChecking(false);
  }, []);

  const handleLogin = (empresa) => { localStorage.setItem("innovaccion_user", empresa); setUser(empresa); };
  const handleLogout = () => { localStorage.removeItem("innovaccion_user"); setUser(null); };

  if (checking) {
    return (
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", fontFamily: "'Montserrat', sans-serif", background: COLORS.navy, color: "#fff" }}>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>🚀</div>
          <div style={{ fontSize: 20, fontWeight: 700 }}>Cargando INNOVACCIÓN...</div>
        </div>
      </div>
    );
  }

  if (!user) return <LoginScreen onLogin={handleLogin} />;
  return <InnovaccionApp user={user} onLogout={handleLogout} />;
}

// ============================================================
// MOUNT
// ============================================================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(AppWrapper));
  </script>
